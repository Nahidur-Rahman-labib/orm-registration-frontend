<div class="app-layout">

    <!-- Top Navbar -->
    <header class="top-navbar">
        <div class="navbar-left">
            <button class="hamburger" (click)="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
            <span class="brand-name" (click)="goHome()">ORM</span>
        </div>

        <div class="navbar-center">
            <span class="page-title" *ngIf="navbar.pageTitle()">
        {{ navbar.pageTitle() }}
      </span>
        </div>

        <div class="navbar-right">
            <ng-container *ngIf="navbar.showActions()">
                <button class="nav-action-btn save" (click)="navbar.triggerSave()" [disabled]="navbar.loading()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save
        </button>
                <button class="nav-action-btn view" (click)="navbar.triggerView()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          View
        </button>
                <button class="nav-action-btn reset" (click)="navbar.triggerReset()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
          Reset
        </button>
                <button class="nav-action-btn exit" (click)="navbar.triggerExit()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Exit
        </button>
            </ng-container>
        </div>
    </header>

    <div class="body-layout">

        <!-- Sidebar -->
        <aside class="sidebar" [class.collapsed]="sidebarCollapsed()">

            <!-- Fast Path -->
            <div class="fast-path-wrap" [class.error]="fastPathError">
                <input class="fast-path-input" type="text" placeholder="Fast Path.." [(ngModel)]="fastPath" (keydown)="onFastPath($event)" maxlength="10" title="Type a code and press Enter to navigate" />
                <span class="fast-path-hint" *ngIf="fastPathError">No match</span>
            </div>


            <!-- Menu (opens flyout) -->
            <button class="nav-item" [class.active]="menuOpen()" (click)="toggleMenu()">
        <svg width="18" height="18" viewBox="0 0 16 16"
          fill="currentColor" aria-hidden="true">
          <rect x="0" y="0" width="4" height="4" rx="0.6"/>
          <rect x="6" y="0" width="4" height="4" rx="0.6"/>
          <rect x="12" y="0" width="4" height="4" rx="0.6"/>
          <rect x="0" y="6" width="4" height="4" rx="0.6"/>
          <rect x="6" y="6" width="4" height="4" rx="0.6"/>
          <rect x="12" y="6" width="4" height="4" rx="0.6"/>
          <rect x="0" y="12" width="4" height="4" rx="0.6"/>
          <rect x="6" y="12" width="4" height="4" rx="0.6"/>
          <rect x="12" y="12" width="4" height="4" rx="0.6"/>
        </svg>
        <span class="nav-label">Menu</span>
      </button>

            <!-- Dashboard -->
            <button class="nav-item" [class.active]="isActive('/client/dashboard')" (click)="navigate('/client/dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </button>

            <!-- Reports -->
            <button class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="nav-label">Reports</span>
      </button>

            <!-- Settings -->
            <button class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83
            l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0
            v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
            l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
            A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
            l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
            a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
            l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
            a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </button>

            <!-- Collapse button at bottom -->
            <button class="collapse-btn" (click)="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"
          [style.transform]="sidebarCollapsed() ? 'rotate(180deg)' : 'none'"
          style="transition: transform 0.22s ease">
          <polyline points="11 17 6 12 11 7"/>
          <polyline points="18 17 13 12 18 7"/>
        </svg>
        <span class="nav-label">Collapse</span>
      </button>
        </aside>

        <!-- Flyout overlay -->
        <div class="flyout-overlay" *ngIf="menuOpen()" (click)="closeMenu()"></div>

        <!-- Flyout panel -->
        <aside class="flyout-panel" [class.open]="menuOpen()" [style.left]="sidebarCollapsed() ? '0px' : '180px'">
            <div class="flyout-header">
                <span>Menu</span>
                <button class="close-btn" (click)="closeMenu()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
            </div>

            <div class="flyout-body">
                <div class="menu-section">
                    <button class="section-header" (click)="toggleSection('client')">
            <span class="section-left">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                <rect x="0" y="0" width="4" height="4" rx="0.6"/>
                <rect x="6" y="0" width="4" height="4" rx="0.6"/>
                <rect x="12" y="0" width="4" height="4" rx="0.6"/>
                <rect x="0" y="6" width="4" height="4" rx="0.6"/>
                <rect x="6" y="6" width="4" height="4" rx="0.6"/>
                <rect x="12" y="6" width="4" height="4" rx="0.6"/>
                <rect x="0" y="12" width="4" height="4" rx="0.6"/>
                <rect x="6" y="12" width="4" height="4" rx="0.6"/>
                <rect x="12" y="12" width="4" height="4" rx="0.6"/>
              </svg>
              Client
            </span>
            <svg class="chevron" [class.rotated]="expandedSection() === 'client'"
              width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

                    <div class="section-items" [class.expanded]="expandedSection() === 'client'">
                        <button class="menu-item" (click)="navigate('/client/create')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
              </svg>
              Create Client
              <span class="fast-badge">CC</span>
            </button>
                        <button class="menu-item" (click)="navigate('/client')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              List Client
              <span class="fast-badge">CV</span>
            </button>
                        <button class="menu-item" (click)="navigate('/client/view')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              Client View
              <span class="fast-badge">CR</span>
            </button>
                    </div>


                    <!-- New section -->
                    <div class="menu-section">
                        <button class="section-header" (click)="toggleSection('account')">
    <span class="section-left">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
        <rect x="0" y="0" width="4" height="4" rx="0.6"/>
        <rect x="6" y="0" width="4" height="4" rx="0.6"/>
        <rect x="12" y="0" width="4" height="4" rx="0.6"/>
        <rect x="0" y="6" width="4" height="4" rx="0.6"/>
        <rect x="6" y="6" width="4" height="4" rx="0.6"/>
        <rect x="12" y="6" width="4" height="4" rx="0.6"/>
        <rect x="0" y="12" width="4" height="4" rx="0.6"/>
        <rect x="6" y="12" width="4" height="4" rx="0.6"/>
        <rect x="12" y="12" width="4" height="4" rx="0.6"/>
      </svg>
      Account Info
    </span>
    <svg class="chevron" [class.rotated]="expandedSection() === 'account'"
      width="13" height="13" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

                        <div class="section-items" [class.expanded]="expandedSection() === 'account'">
                            <button class="menu-item" (click)="navigate('/YOUR_ROUTE')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Account 1
      <span class="fast-badge">A1</span>
    </button>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content" [class.expanded]="sidebarCollapsed()">
            <router-outlet></router-outlet>
        </main>

    </div>
</div>
