<div class="shell">

    <!-- Narrow icon sidebar -->
    <aside class="icon-sidebar">
        <div class="brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
        </div>

        <nav class="icon-nav">
            <!-- Menu -->
            <button class="icon-btn" [class.active]="menuOpen()" (click)="toggleMenu()" title="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <span>Menu</span>
      </button>

            <!-- Dashboard -->
            <button class="icon-btn" (click)="navigate('/')" title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </button>

            <!-- Reports (placeholder) -->
            <button class="icon-btn" title="Reports">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Reports</span>
      </button>

            <!-- Settings (placeholder) -->
            <button class="icon-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
            a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
            A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
            l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
            A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
            l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
            a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
            l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
            a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
        </nav>
    </aside>

    <!-- Flyout menu panel -->
    <div class="flyout-overlay" *ngIf="menuOpen()" (click)="closeMenu()"></div>

    <aside class="flyout-panel" [class.open]="menuOpen()">
        <div class="flyout-header">
            <span>Menu</span>
            <button class="close-btn" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
        </div>

        <div class="flyout-body">
            <!-- Client section -->
            <div class="menu-section">
                <button class="section-header" (click)="toggleSection('client')">
          <span class="section-left">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <rect x="0" y="0" width="4" height="4" rx="0.6"/>
              <rect x="6" y="0" width="4" height="4" rx="0.6"/>
              <rect x="12" y="0" width="4" height="4" rx="0.6"/>
              <rect x="0" y="6" width="4" height="4" rx="0.6"/>
              <rect x="6" y="6" width="4" height="4" rx="0.6"/>
              <rect x="12" y="6" width="4" height="4" rx="0.6"/>
              <rect x="0" y="12" width="4" height="4" rx="0.6"/>
              <rect x="6" y="12" width="4" height="4" rx="0.6"/>
              <rect x="12" y="12" width="4" height="4" rx="0.6"/>
            </svg>
            Client
          </span>
          <svg class="chevron" [class.rotated]="expandedSection() === 'client'"
            width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

                <div class="section-items" [class.expanded]="expandedSection() === 'client'">
                    <button class="menu-item" (click)="navigate('/client/new')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Create Client
          </button>
                    <button class="menu-item" (click)="navigate('/client')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            View Clients
          </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div class="main-content">
        <router-outlet></router-outlet>
    </div>

</div>
