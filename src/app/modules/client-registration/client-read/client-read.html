<section class="client-read-page">
    <div class="chapter-line">
        <span>CLIENT LIST </span>
        <strong>ORM</strong>
    </div>

    <h1>All Clients</h1>
    <p class="subtitle">View, edit, or remove client registration records.</p>

    <div class="state-message loading" *ngIf="loading">Loading...</div>
    <div class="state-message error" *ngIf="error">{{ error }}</div>

    <div class="table-card" *ngIf="!loading && clients.length > 0">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th class="actions-col">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let client of clients">
                    <td>{{ client.clientName }}</td>
                    <td>
                        <div class="actions">
                            <app-button label="Edit" variant="ghost" size="sm" (onClick)="editClient(client.clientId)"></app-button>

                            <app-button label="Delete" variant="danger" size="sm" (onClick)="deleteClient(client.clientId)"></app-button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="state-message empty" *ngIf="!loading && clients.length === 0">No clients found.</div>
</section>
